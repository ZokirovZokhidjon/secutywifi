<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wi-Fi Назорат Панели</title>
    <style>
        :root {
            --primary: #2563eb; --danger: #ef4444; --success: #22c55e;
            --bg: #f8fafc; --card: #ffffff; --text: #1e293b;
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); padding: 20px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 600px; }
        header { text-align: center; margin-bottom: 30px; }
        .status-card { background: var(--card); padding: 20px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        .status-dot { height: 12px; width: 12px; background: var(--success); border-radius: 50%; display: inline-block; margin-right: 8px; }
        .device-item { background: var(--card); padding: 15px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; border-left: 5px solid var(--primary); margin-bottom: 15px; }
        .device-info h4 { margin: 0; font-size: 16px; }
        .device-info p { margin: 5px 0 0; font-size: 13px; color: #64748b; }
        .btn-block { background: var(--danger); color: white; border: none; padding: 8px 15px; border-radius: 8px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h2>Wi-Fi Monitor</h2>
        <p>Firebase Булутли Бошқарув</p>
    </header>

    <div class="status-card">
        <div><span class="status-dot"></span><strong>Ҳолат:</strong> Онлайн</div>
        <div id="count">Қурилмалар: 0</div>
    </div>

    <div id="deviceList">
        <p style="text-align:center;">Firebase-га уланилмоқда...</p>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCt-tBUYfEtl2j3jaXCBKOvlWoBLR8SeUA",
        authDomain: "securitywifi-653bd.firebaseapp.com",
        projectId: "securitywifi-653bd",
        storageBucket: "securitywifi-653bd.firebasestorage.app",
        messagingSenderId: "920881182887",
        appId: "1:920881182887:web:fd7ff30f6fba06c318c382",
        databaseURL: "https://securitywifi-653bd-default-rtdb.firebaseio.com"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // Реал вақтда маълумотни кузатиш
    db.ref('wifi_devices').on('value', (snapshot) => {
        const list = document.getElementById('deviceList');
        const countDisplay = document.getElementById('count');
        const devices = snapshot.val();
        
        list.innerHTML = '';
        
        if (!devices) {
            list.innerHTML = '<p style="text-align:center;">Ҳозирча қурилмалар йўқ.</p>';
            countDisplay.innerText = "Қурилмалар: 0";
            return;
        }

        const deviceArray = Object.values(devices);
        countDisplay.innerText = `Қурилмалар: ${deviceArray.length}`;

        deviceArray.forEach(d => {
            list.innerHTML += `
                <div class="device-item">
                    <div class="device-info">
                        <h4>${d.name || 'Noma'lum Қурилма'}</h4>
                        <p>IP: ${d.ip} | MAC: ${d.mac}</p>
                    </div>
                    <button class="btn-block" onclick="alert('Блоклаш сўрови юборилди: ${d.mac}')">Узиш</button>
                </div>`;
        });
    });
</script>
</body>
</html>
